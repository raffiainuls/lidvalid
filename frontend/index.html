<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LidValid</title>
    <script>
      // Applied before React mounts (and before first paint) so the page
      // never flashes the wrong theme -- same trick the old Jinja2 UI used
      // for its sidebar-collapsed state (see base.html).
      (function () {
        var stored = localStorage.getItem("lidvalid_theme") || "system";
        var dark =
          stored === "dark" ||
          (stored === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
