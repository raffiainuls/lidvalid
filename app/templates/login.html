{% extends "base.html" %}
{% block title %}Login — LidValid{% endblock %}
{% block content %}
<div class="center-box card">
  <h1 style="margin-top:0">Masuk ke LidValid</h1>
  {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
  <form class="stack" method="post" action="/login">
    <input type="hidden" name="next" value="{{ next or '' }}">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required value="admin@lidvalid.local">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button class="btn acc" type="submit">Masuk</button>
  </form>
  <p class="subtle" style="margin-top:14px">Login pertama kali: lihat konsol tempat <span class="mono">uvicorn</span> dijalankan untuk kredensial admin bootstrap.</p>
</div>
{% endblock %}
