{% extends "base.html" %}
{% block title %}{{ 'Edit' if connection else 'Tambah' }} Koneksi — LidValid{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ 'Edit Koneksi' if connection else 'Tambah Koneksi' }}</h1></div>
<div class="card" style="max-width:560px">
<form class="stack" method="post" action="{{ '/connections/%d' % connection.id if connection else '/connections' }}">
  <div class="field">
    <label>Nama</label>
    <input name="name" required value="{{ connection.name if connection else '' }}" placeholder="mis. MySQL Staging">
  </div>
  <div class="field">
    <label>Engine</label>
    <select name="engine" required>
      {% for e in engines %}
      <option value="{{ e }}" {{ 'selected' if connection and connection.engine==e else '' }}>{{ e }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label>Host (diabaikan untuk engine sqlite)</label>
    <input name="host" value="{{ connection.host if connection else '' }}" placeholder="10.x.x.x atau clickhouse-host.example.com">
  </div>
  <div class="field">
    <label>Port</label>
    <input name="port" type="number" value="{{ connection.port if connection else '' }}" placeholder="3306 / 8123">
  </div>
  <div class="field">
    <label>Database (untuk sqlite: path file .sqlite)</label>
    <input name="database" value="{{ connection.database if connection else '' }}" placeholder="staging_db atau d:/.../demo.sqlite">
  </div>
  <div class="field">
    <label>Username</label>
    <input name="username" value="{{ connection.username if connection else '' }}">
  </div>
  <div class="field">
    <label>Password {{ '(kosongkan bila tidak diubah)' if connection else '' }}</label>
    <input name="password" type="password">
  </div>
  <div class="row-actions">
    <button class="btn acc" type="submit">Simpan</button>
    <a class="btn" href="/connections">Batal</a>
  </div>
</form>
</div>
{% endblock %}
