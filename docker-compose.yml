services:
  app:
    build: .
    container_name: lidvalid_app
    restart: unless-stopped
    env_file: .env
    environment:
      - LIDVALID_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - internal
    # Lets the app container reach services bound to the VPS HOST's
    # localhost (e.g. an `ssh -R 8123:...` reverse tunnel opened from a
    # laptop) via the hostname `host.docker.internal` -- a container's own
    # localhost is NOT the host's. Only relevant when a Connection is
    # pointed at host.docker.internal (the SSH-reverse-tunnel path); once a
    # dedicated OpenVPN client runs directly on the VPS host instead,
    # Connections switch to the real private hostnames and this is unused
    # (harmless to leave in either way).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    container_name: lidvalid_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
