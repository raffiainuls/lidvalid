services:
  postgres:
    image: postgres:16-alpine
    container_name: lidvalid_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: lidvalid_app
    restart: unless-stopped
    env_file: .env
    environment:
      - LIDVALID_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    # Lets the app container reach services bound to the VPS HOST (e.g. an
    # `ssh -R 0.0.0.0:8123:...` reverse tunnel opened from a laptop) via the
    # hostname `host.docker.internal` -- a container's own localhost is NOT
    # the host's. Pinned to the `internal` network's own gateway IP (below)
    # rather than Docker's `host-gateway` magic value: on this host that
    # value resolved to the DEFAULT bridge's gateway (172.17.0.1), not this
    # custom network's (172.28.1.1) -- the container has no route to the
    # former since it's only attached to the latter. Also requires a
    # matching `ufw allow from 172.28.1.0/24` on the VPS host, since ufw's
    # default-deny INPUT policy blocks this bridge-to-host traffic otherwise
    # (Docker's own iptables rules don't exempt it).
    # Only relevant for the SSH-reverse-tunnel path; once a dedicated OpenVPN
    # client runs directly on the VPS host instead, Connections switch to the
    # real private hostnames and this goes unused (harmless to leave either way).
    extra_hosts:
      - "host.docker.internal:172.28.1.1"

  caddy:
    image: caddy:2-alpine
    container_name: lidvalid_caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
          gateway: 172.28.1.1

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
